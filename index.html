<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>تسجيل الدخول | نظام الدعوات الإلكترونية</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
  <link rel="shortcut icon" href="favicon.ico">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    .index-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      background-image:
        radial-gradient(ellipse 60% 50% at 30% 10%, rgba(79, 134, 247, 0.16) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 90%, rgba(26, 86, 219, 0.1) 0%, transparent 55%);
    }

    .index-card {
      background: white;
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
      border: 1px solid #dde4f0;
      max-width: 400px;
      width: 100%;
      text-align: center;
      animation: fadeUp 0.5s ease;
    }

    .index-logo-wrap {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #1a56db, #1341b0);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      margin: 0 auto 18px;
      box-shadow: 0 8px 24px rgba(26, 86, 219, 0.3);
    }

    .index-title {
      font-size: 21px;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 4px;
    }

    .index-sub {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 28px;
    }

    .login-submit {
      width: 100%;
      padding: 13px;
      font-size: 14.5px;
      margin-top: 8px;
      justify-content: center;
      letter-spacing: 0.2px;
    }

    .login-footer {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 18px;
      text-align: center;
    }

    .login-submit:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .login-spinner {
      width: 16px;
      height: 16px;
      border: 2.5px solid rgba(255, 255, 255, 0.4);
      border-top-color: #fff;
      border-radius: 50%;
      display: inline-block;
      animation: loginSpin 0.7s linear infinite;
      margin-left: 8px;
    }

    @keyframes loginSpin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div class="index-wrapper">
    <div class="index-card">
      <div class="index-logo-wrap">🎓</div>
      <h2 class="index-title">نظام الدعوات الإلكترونية</h2>
      <p class="index-sub">يرجى تسجيل الدخول للمتابعة إلى لوحة التحكم</p>

      <div class="error-msg" id="error-message">❌ البريد الإلكتروني أو كلمة المرور غير صحيحة!</div>

      <form id="index-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">البريد الإلكتروني</label>
          <input type="email" id="username" required placeholder="admin@yourevent.com" autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">كلمة المرور</label>
          <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary login-submit" id="login-btn">
          🔓 تسجيل الدخول
        </button>
      </form>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://gpaqcfhswfnudpqlxcfs.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_WiQrWKnOxv0RZKLVgFChXQ_1Sb2LRRq";

    const supabaseClient = (window.supabase && window.supabase.createClient)
      ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
      : null;

    // إذا كان المستخدم مسجّل الدخول بالفعل (جلسة فعّالة)، انتقل مباشرة
    if (supabaseClient) {
      supabaseClient.auth.getSession().then(({ data: { session } }) => {
        if (session) window.location.replace('invitation_system_1.html');
      });
    }

    function translateAuthError(message) {
      if (!message) return 'حدث خطأ غير متوقع، حاول مجدداً';
      if (message.includes('Invalid login credentials')) return '❌ البريد الإلكتروني أو كلمة المرور غير صحيحة!';
      if (message.includes('Email not confirmed')) return '❌ هذا البريد غير مؤكد، يرجى تأكيده من Supabase أولاً';
      if (message.includes('Too many requests')) return '❌ محاولات كثيرة، يرجى الانتظار قليلاً والمحاولة مجدداً';
      return '❌ ' + message;
    }

    async function handleLogin(event) {
      event.preventDefault();

      if (!supabaseClient) {
        alert('تعذر الاتصال بخدمة المصادقة. تحقق من الإنترنت.');
        return;
      }

      const email = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      const errMsg = document.getElementById('error-message');
      const btn = document.getElementById('login-btn');

      errMsg.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = 'جاري تسجيل الدخول... <span class="login-spinner"></span>';

      const { error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });

      if (error) {
        errMsg.textContent = translateAuthError(error.message);
        errMsg.style.display = 'block';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
        btn.disabled = false;
        btn.innerHTML = '🔓 تسجيل الدخول';
        setTimeout(() => { errMsg.style.display = 'none'; }, 5000);
      } else {
        window.location.href = 'invitation_system_1.html';
      }
    }
  </script>
</body>

</html>
