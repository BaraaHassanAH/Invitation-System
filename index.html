<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>تسجيل الدخول | نظام الدعوات الإلكترونية</title>
  <meta name="description" content="نظام إدارة دعوات وحضور الفعاليات إلكترونياً عبر رموز QR">
  <meta property="og:title" content="نظام الدعوات الإلكترونية">
  <meta property="og:description" content="إدارة دعوات وحضور الفعاليات سحابياً عبر رموز QR">
  <meta property="og:image" content="https://invitation-system-zeta.vercel.app/og-image.png">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ar_AR">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://invitation-system-zeta.vercel.app/og-image.png">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="favicon-192.png">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="index-wrapper">
    <div class="index-card">
      <div class="index-logo-wrap">
        <img src="logo.png" alt="شعار النظام" class="index-logo-img">
      </div>
      <h2 class="index-title">نظام الدعوات الإلكترونية</h2>
      <p class="index-sub">يرجى تسجيل الدخول للمتابعة إلى لوحة التحكم</p>

      <div class="error-msg" id="error-message"></div>

      <form id="index-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">البريد الإلكتروني</label>
          <input type="email" id="username" required placeholder="admin@yourevent.com" autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">كلمة المرور</label>
          <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary login-submit" id="login-btn">
          🔓 تسجيل الدخول
        </button>
      </form>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://gpaqcfhswfnudpqlxcfs.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_WiQrWKnOxv0RZKLVgFChXQ_1Sb2LRRq";

    const supabaseClient = (window.supabase && window.supabase.createClient)
      ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
      : null;

    if (supabaseClient) {
      supabaseClient.auth.getSession().then(({ data: { session } }) => {
        if (session) window.location.replace('invitation_system_1.html');
      });
    }

    function translateAuthError(message) {
      if (!message) return 'حدث خطأ غير متوقع، حاول مجدداً';
      if (message.includes('Invalid login credentials')) return '❌ البريد الإلكتروني أو كلمة المرور غير صحيحة!';
      if (message.includes('Email not confirmed')) return '❌ هذا البريد غير مؤكد، يرجى تأكيده من Supabase أولاً';
      if (message.includes('Too many requests')) return '❌ محاولات كثيرة، يرجى الانتظار قليلاً والمحاولة مجدداً';
      return '❌ ' + message;
    }

    async function handleLogin(event) {
      event.preventDefault();
      if (!supabaseClient) { alert('تعذر الاتصال بخدمة المصادقة.'); return; }

      const email = document.getElementById('username').value.trim();
      const pass  = document.getElementById('password').value;
      const errMsg = document.getElementById('error-message');
      const btn    = document.getElementById('login-btn');

      errMsg.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = 'جاري تسجيل الدخول... <span class="login-spinner"></span>';

      const { error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });

      if (error) {
        errMsg.textContent = translateAuthError(error.message);
        errMsg.style.display = 'block';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
        btn.disabled = false;
        btn.innerHTML = '🔓 تسجيل الدخول';
        setTimeout(() => { errMsg.style.display = 'none'; }, 5000);
      } else {
        window.location.href = 'invitation_system_1.html';
      }
    }
  </script>
</body>
</html>
