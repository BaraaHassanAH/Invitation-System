<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>تسجيل الدخول | نظام الدعوات الإلكترونية</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
  <link rel="shortcut icon" href="favicon.ico">
  <style>
    .index-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      background-image:
        radial-gradient(ellipse 60% 50% at 30% 10%, rgba(79, 134, 247, 0.16) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 90%, rgba(26, 86, 219, 0.1) 0%, transparent 55%);
    }

    .index-card {
      background: white;
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
      border: 1px solid #dde4f0;
      max-width: 400px;
      width: 100%;
      text-align: center;
      animation: fadeUp 0.5s ease;
    }

    .index-logo-wrap {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #1a56db, #1341b0);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      margin: 0 auto 18px;
      box-shadow: 0 8px 24px rgba(26, 86, 219, 0.3);
    }

    .index-title {
      font-size: 21px;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 4px;
    }

    .index-sub {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 28px;
    }

    .login-submit {
      width: 100%;
      padding: 13px;
      font-size: 14.5px;
      margin-top: 8px;
      justify-content: center;
      letter-spacing: 0.2px;
    }

    .login-footer {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 18px;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="index-wrapper">
    <div class="index-card">
      <div class="index-logo-wrap">🎓</div>
      <h2 class="index-title">نظام الدعوات الإلكترونية</h2>
      <p class="index-sub">يرجى تسجيل الدخول للمتابعة إلى لوحة التحكم</p>

      <div class="error-msg" id="error-message">❌ اسم المستخدم أو كلمة المرور غير صحيحة!</div>

      <form id="index-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">اسم المستخدم</label>
          <input type="text" id="username" required placeholder="أدخل اسم المستخدم" autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">كلمة المرور</label>
          <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary login-submit">
          🔓 تسجيل الدخول
        </button>
      </form>

      <p class="login-footer">بيانات الدخول الافتراضية: admin / admin123</p>
    </div>
  </div>

  <script>
    // إذا كان المستخدم مسجّل الدخول بالفعل، انتقل مباشرة
    if (sessionStorage.getItem('isLoggedIn') === 'true') {
      window.location.replace('invitation_system_1.html');
    }

    function handleLogin(event) {
      event.preventDefault();
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      const errMsg = document.getElementById('error-message');

      if (user === 'admin' && pass === 'admin123') {
        sessionStorage.setItem('isLoggedIn', 'true');
        window.location.href = 'invitation_system_1.html';
      } else {
        errMsg.style.display = 'block';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
        // إخفاء الرسالة تلقائياً بعد 4 ثواني
        setTimeout(() => { errMsg.style.display = 'none'; }, 4000);
      }
    }
  </script>
</body>

</html>
