<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>تسجيل الحضور | نظام الدعوات الإلكترونية</title>
  <meta name="description" content="نظام إدارة دعوات وحضور الفعاليات إلكترونياً عبر رموز QR">
  <meta property="og:title" content="نظام الدعوات الإلكترونية">
  <meta property="og:description" content="إدارة دعوات وحضور الفعاليات سحابياً عبر رموز QR">
  <meta property="og:image" content="https://invitation-system-zeta.vercel.app/og-image.png">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ar_AR">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://invitation-system-zeta.vercel.app/og-image.png">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="favicon-192.png">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>

<body class="scan-body state-loading" id="scan-body">
  <div style="width:100%;">
    <div class="scan-card" id="scan-card">
      <div class="scan-brand">
        <img src="logo.png" alt="" class="scan-brand-logo">
        نظام الدعوات الإلكترونية
      </div>

      <div id="scan-icon"><div class="scan-spinner"></div></div>

      <div class="result-status-text" id="scan-status">جاري التحقق من رمز الدعوة...</div>
      <div class="result-student-name" id="scan-name"   style="display:none;">—</div>
      <div class="result-student-id"   id="scan-sid"    style="display:none;">—</div>
      <div id="scan-inv" class="result-inv-badge"       style="display:none;">—</div>
      <div class="result-time"         id="scan-time"   style="display:none;">—</div>
      <div class="result-code"         id="scan-code"   style="display:none;">—</div>

      <button class="scan-retry" id="scan-retry-btn" style="display:none;" onclick="location.reload()">
        🔄 إعادة المحاولة
      </button>
    </div>
    <p class="scan-footer">يتم تسجيل الحضور سحابياً ومباشرة عبر النظام</p>
  </div>

  <script>
    const SUPABASE_URL = "https://gpaqcfhswfnudpqlxcfs.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_WiQrWKnOxv0RZKLVgFChXQ_1Sb2LRRq";

    const supabaseClient = (window.supabase && window.supabase.createClient)
      ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
      : null;

    const el = id => document.getElementById(id);

    function setState(state, opts = {}) {
      el('scan-body').className = 'scan-body state-' + state;

      const icons     = { success: '✅', duplicate: '⚠️', invalid: '❌' };
      const statusCls = { success: 'ok', duplicate: 'dup', invalid: 'bad' };
      const statusTx  = {
        success:   'تم تسجيل حضورك بنجاح',
        duplicate: 'هذه الدعوة مستخدمة مسبقاً',
        invalid:   opts.message || 'رمز الدعوة غير صالح أو غير موجود'
      };

      if (state === 'loading') return;

      el('scan-icon').innerHTML = `<div class="result-big-icon">${icons[state]}</div>`;

      const statusEl = el('scan-status');
      statusEl.textContent = statusTx[state];
      statusEl.className = 'result-status-text ' + statusCls[state];

      if (state !== 'invalid') {
        el('scan-name').style.display = 'block';
        el('scan-name').textContent = opts.name || '—';
        el('scan-sid').style.display = 'block';
        el('scan-sid').textContent = 'رقم الطالب: ' + (opts.studentId || '—');
        const invEl = el('scan-inv');
        invEl.style.display = 'inline-block';
        invEl.textContent = 'دعوة ' + (opts.invNum === 1 ? 'الأولى' : 'الثانية');
        invEl.className = 'result-inv-badge ' + (opts.invNum === 1 ? 'badge-info' : 'badge-success');
        el('scan-time').style.display = 'block';
        el('scan-time').textContent = state === 'duplicate'
          ? 'سبق تسجيل الحضور في: ' + (opts.usedAt || '—')
          : 'وقت الدخول: ' + new Date().toLocaleTimeString('ar-SA');
      }
      if (opts.code) {
        el('scan-code').style.display = 'block';
        el('scan-code').textContent = opts.code;
      }
      if (state === 'invalid') {
        el('scan-retry-btn').style.display = 'inline-block';
      }
    }

    async function run() {
      const params = new URLSearchParams(window.location.search);
      const code = (params.get('code') || '').trim();

      if (!code) { setState('invalid', { message: 'لم يتم تحديد رمز دعوة في الرابط' }); return; }
      if (!supabaseClient) { setState('invalid', { message: 'تعذر الاتصال بقاعدة البيانات' }); return; }

      try {
        const { data, error } = await supabaseClient.rpc('check_in_invitation', { p_code: code });

        if (error || !data || !data.status || data.status === 'invalid') {
          setState('invalid', { code }); return;
        }
        if (data.status === 'duplicate') {
          setState('duplicate', {
            name: data.name, studentId: data.student_id, invNum: data.inv_num,
            usedAt: data.used_at ? new Date(data.used_at).toLocaleTimeString('ar-SA') : null, code
          }); return;
        }
        setState('success', { name: data.name, studentId: data.student_id, invNum: data.inv_num, code });
      } catch (e) {
        console.error(e);
        setState('invalid', { message: 'تعذر الاتصال بالخادم، تحقق من الإنترنت', code });
      }
    }
    run();
  </script>
</body>
</html>
